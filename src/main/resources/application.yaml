spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5433/postgres
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: inventory_service
  flyway:
    schemas: inventory_service
    default-schema: inventory_service
    create-schemas: true

server:
  port: 8082

#Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env
  endpoint:
    health:
      show-details: always
  observations:
    key-values:
      application: inventory-service

  #Tracing configs
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces # Endpoint for traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs # Endpoint for logs
    otlp:
      metrics:
        export:
          endpoint: http://localhost:4318/v1/metrics # Endpoint for metrics
          step: 2s # Export interval
otel:
  service:
    name: inventory-service